{% extends 'base.html' %}

{% block title %}Backup History{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h1>Backup History</h1>
        <p>View, download, and manage past backups.</p>
    </div>
    <button class="btn btn-primary btn-sm" onclick="fetchHistory()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
</div>

<div class="glass-panel">
    <div class="table-responsive">
        <table class="table" id="history-table">
            <thead>
                <tr>
                    {% if user.role == 'admin' %}
                    <th>User</th>
                    {% endif %}
                    <th>Date & Time</th>
                    <th>File Name</th>
                    <th>Size</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <tr><td colspan="6" class="text-center"><div class="spinner" style="display:inline-block; border-color: rgba(139,92,246,0.3); border-top-color: var(--accent);"></div></td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const isAdmin = {{ 'true' if user.role == 'admin' else 'false' }};

    async function fetchHistory() {
        const tbody = document.getElementById('history-body');
        tbody.innerHTML = `<tr><td colspan="6" class="text-center"><div class="spinner" style="display:inline-block; border-color: rgba(139,92,246,0.3); border-top-color: var(--accent);"></div></td></tr>`;
        try {
            const res = await fetch('/api/backup-history');
            const result = await res.json();
            
            if(result.data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No backups found in history.</td></tr>`;
                return;
            }
            
            let html = '';
            result.data.forEach(b => {
                let statusBadge = '';
                if(b.status === 'success') statusBadge = '<span class="badge badge-success">Success</span>';
                else if(b.status === 'pending') statusBadge = '<span class="badge badge-warning">Pending</span>';
                else statusBadge = '<span class="badge badge-danger">Failed</span>';
                
                html += `<tr>`;
                if (isAdmin) html += `<td>${b.username}</td>`;
                html += `
                    <td>${b.created_at}</td>
                    <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis;" title="${b.filename}">${b.filename}</td>
                    <td>${b.file_size}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="downloadBackup(${b.id})" ${b.status!=='success'?'disabled':''} title="Download from S3"><i class="fa-solid fa-download"></i></button>
                        <button class="btn btn-danger btn-sm" onclick="deleteBackup(${b.id})" title="Delete Backup"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Failed to load history.</td></tr>`;
            showToast('Error loading history.', 'error');
        }
    }

    async function downloadBackup(id) {
        showToast('Requesting secure download link...', 'info');
        try {
            const res = await fetch('/api/download-backup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            const data = await res.json();
            if(data.success) {
                window.location.href = data.url;
            } else {
                showToast(data.message || 'Download failed.', 'error');
            }
        } catch(e) {
            showToast('Connection error.', 'error');
        }
    }

    async function deleteBackup(id) {
        if(!confirm('Are you sure you want to delete this backup from the database and S3? This action cannot be undone.')) return;
        
        try {
            const res = await fetch('/api/delete-backup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            const data = await res.json();
            if(data.success) {
                showToast('Backup deleted successfully.', 'success');
                fetchHistory();
            } else {
                showToast(data.message || 'Delete failed.', 'error');
            }
        } catch(e) {
            showToast('Connection error.', 'error');
        }
    }

    document.addEventListener('DOMContentLoaded', fetchHistory);
</script>
{% endblock %}
